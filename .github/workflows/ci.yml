name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 24]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan for leaked secrets
        uses: gacts/gitleaks@v1

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run audit
      - run: npm run lint
      - run: npm run skills:validate
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      - run: npm run pack:smoke
